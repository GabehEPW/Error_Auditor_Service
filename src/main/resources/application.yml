spring:
  datasource:
    url: jdbc:h2:mem:error_auditor;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    properties:
      "[hibernate.format_sql]": true
  h2:
    console:
      enabled: true
      path: /h2
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
      region:
        static: us-east-1

app:
  sqs:
    dlq-name: ${APP_SQS_DLQ_NAME:T0XN_SEU_NOME-DLQ.fifo}
    queue-name: ${APP_SQS_QUEUE_NAME:T0XN_SEU_NOME.fifo}
